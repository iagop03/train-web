name: CI/CD Web

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Lint
      run: npm run lint
    
    - name: Build
      run: npm run build
    
    - name: Test
      run: npm run test:ci
    
    - name: Upload Coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage/lcov.info
        flags: angular
    
    - name: SonarQube Analysis
      run: npm run sonar
      env:
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        SONAR_LOGIN: ${{ secrets.SONAR_LOGIN }}
      continue-on-error: true
    
    - name: Build Docker Image
      if: github.ref == 'refs/heads/main'
      run: docker build -t gcr.io/${{ secrets.GCP_PROJECT }}/train-web:${{ github.sha }} .
    
    - name: Push to GCP
      if: github.ref == 'refs/heads/main'
      run: |
        echo ${{ secrets.GCP_SA_KEY }} | base64 -d | docker login -u _json_key --password-stdin https://gcr.io
        docker push gcr.io/${{ secrets.GCP_PROJECT }}/train-web:${{ github.sha }}
